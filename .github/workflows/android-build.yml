name: Android Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore dependencies
        run: dotnet restore Emuera.Engine/Emuera.Engine.csproj

      - name: Build Engine
        run: dotnet build Emuera.Engine/Emuera.Engine.csproj --no-restore

      - name: Run unit tests
        run: dotnet test Emuera.Tests/Emuera.Tests.csproj --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Build Release APK
        run: |
          dotnet build Emuera.Android/Emuera.Android.csproj \
            -c Release \
            -p:AndroidKeyStore=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: emuera-android
          path: Emuera.Android/bin/Release/net9.0-android/*.apk
